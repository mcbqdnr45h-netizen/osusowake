kind = "web"
previewPath = "/"
title = "RescuEat"
version = "1.0.0"
id = "artifacts/rescueat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23812
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rescueat run dev"

[services.env]
PORT = "23812"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rescueat", "run", "build"]
publicDir = "artifacts/rescueat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

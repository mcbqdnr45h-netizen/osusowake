<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Osusowake</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Osusowake" />
    <style>
      body { margin: 0; background: #fdf8f3; }
      #root { min-height: 100dvh; }
      /* Hide Google Maps error dialog — keep in DOM (removing causes Maps to recreate it) */
      .gm-err-container,
      .gm-err-dialog,
      [class*="gm-err"] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-react" style="position:fixed;inset:0;background:#fdf8f3;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;">
        <div style="width:64px;height:64px;background:#F26419;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 20px rgba(242,100,25,0.3);">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </div>
        <div style="color:#1a1a1a;font-size:22px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px;">Osusowake</div>
        <div style="color:#a0968a;font-size:13px;">読み込み中...</div>
      </div>
    </div>
    <script>
      /* Runs before module script. HIDE (not remove) error elements so Maps
         doesn't detect them missing and recreate them. */
      function _hideGmErr() {
        try {
          document.querySelectorAll('[class*="gm-err"]').forEach(function(el) {
            el.style.setProperty('display', 'none', 'important');
            el.style.setProperty('visibility', 'hidden', 'important');
            el.style.setProperty('pointer-events', 'none', 'important');
            el.style.setProperty('opacity', '0', 'important');
          });
        } catch(e) {}
      }
      window.gm_authFailure = function() {
        _hideGmErr();
        setTimeout(_hideGmErr, 50);
        setTimeout(_hideGmErr, 200);
        setTimeout(_hideGmErr, 500);
      };
      var _gmObs = new MutationObserver(function() { _hideGmErr(); });
      _gmObs.observe(document.documentElement, { childList: true, subtree: true });
      var _gmPoll = setInterval(function() {
        if (document.querySelectorAll('[class*="gm-err"]').length > 0) _hideGmErr();
      }, 200);
      setTimeout(function() { clearInterval(_gmPoll); }, 30000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

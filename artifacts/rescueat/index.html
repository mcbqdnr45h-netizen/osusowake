<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <!-- iOS WKWebView 内蔵 HTTPCache を完全無効化（古い HTML/JS の固着防止） -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>おすそわけ - ご近所のお店からおトクにシェア</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E8786C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="おすそわけ" />
    <link rel="apple-touch-icon" href="/images/logo.jpg" />

    <!-- SEO / OGP -->
    <meta name="description" content="お近くのお店からお得なおすそわけバッグをゲットしよう。毎日更新されるサプライズバッグで、美味しさをおすそわけ。" />
    <meta property="og:title" content="おすそわけ - ご近所のお店からおトクにシェア" />
    <meta property="og:description" content="お近くのお店からお得なサプライズバッグをゲットしよう" />
    <meta property="og:site_name" content="おすそわけ" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />

    <!-- Fonts: Noto Sans JP (body) + Outfit (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <!-- Google Maps 用の事前接続: 地図ページの初回表示を高速化 (DNS/TLS を先行) -->
    <link rel="preconnect" href="https://maps.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://maps.googleapis.com">
    <link rel="dns-prefetch" href="https://maps.gstatic.com">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <!--
      ★ 起動時スプラッシュ (白画面対策)
      JS/CSS バンドルが download → parse → React 初回描画する間、
      何もないと真っ白な画面が長く見えてしまう。
      HTML 内にインラインでロゴを置いておくことで、 サーバーから index.html が
      返った瞬間に表示される。 React マウント (#root に子要素が入る) を検知して
      自動で fade out → 完全消滅させる。
    -->
    <style>
      #__splash {
        position: fixed; inset: 0; z-index: 999999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #FBF8F4;
        transition: opacity .35s ease-out;
        pointer-events: none;
      }
      #__splash.__hide { opacity: 0; }
      #__splash img {
        width: 96px; height: 96px; border-radius: 22px;
        box-shadow: 0 12px 28px -10px rgba(232,120,108,.35);
        animation: __splashPulse 1.6s ease-in-out infinite;
      }
      #__splash .__brand {
        margin-top: 18px; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
        font-weight: 900; font-size: 15px; color: #2A2623; letter-spacing: .04em;
      }
      @keyframes __splashPulse {
        0%, 100% { transform: scale(1);    opacity: 1;    }
        50%      { transform: scale(1.05); opacity: .85;  }
      }
      @media (prefers-reduced-motion: reduce) {
        #__splash img { animation: none; }
      }
    </style>
    <div id="__splash" aria-hidden="true">
      <img src="/images/logo-192.png" alt="" />
    </div>

    <div id="root"></div>
    <script>
      // ★ #root が DOM に存在した後に必ず実行 (この script タグは <div id="root"> の直後)。
      // React の createRoot が #root に最初の子を注入したら splash を消す。
      // タイマーフォールバック (8s) + 異常系の保険 (root 取得失敗でも強制 remove) も置く。
      (function () {
        var splash = document.getElementById('__splash');
        if (!splash) return;
        var removed = false;
        var hide = function () {
          if (removed) return;
          removed = true;
          splash.classList.add('__hide');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 400);
        };
        var root = document.getElementById('root');
        if (root) {
          // 既にマウント済み (キャッシュ等) なら即 hide
          if (root.firstElementChild) { hide(); return; }
          var observer = new MutationObserver(function () {
            if (root.firstElementChild) { observer.disconnect(); hide(); }
          });
          observer.observe(root, { childList: true });
        }
        // どんな異常系 (root 取得失敗 / observer 不発火) でも 8 秒で強制消去
        setTimeout(hide, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // SW is only registered in production (not Replit dev proxy)
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.includes('replit')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] registered:', reg.scope))
            .catch(err => console.warn('[SW] registration failed:', err));
        });
      }
    </script>
  </body>
</html>

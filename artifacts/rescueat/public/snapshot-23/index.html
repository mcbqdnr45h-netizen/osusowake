<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <!-- iOS WKWebView 内蔵 HTTPCache を完全無効化（古い HTML/JS の固着防止） -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Osusowake - おすそ分けアプリ</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E8786C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Osusowake" />
    <link rel="apple-touch-icon" href="/images/logo.jpg" />

    <!-- SEO / OGP -->
    <meta name="description" content="お近くのお店からお得なおすそ分けバッグをゲットしよう。毎日更新されるサプライズバッグで、美味しさをおすそ分け。" />
    <meta property="og:title" content="Osusowake - おすそ分けアプリ" />
    <meta property="og:description" content="お近くのお店からお得なサプライズバッグをゲットしよう" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:type" content="website" />

    <!-- Fonts: Noto Sans JP (body) + Outfit (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // SW is only registered in production (not Replit dev proxy)
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && !location.hostname.includes('replit')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] registered:', reg.scope))
            .catch(err => console.warn('[SW] registration failed:', err));
        });
      }
    </script>
  </body>
</html>

kind = "slides"
previewPath = "/meishi/"
title = "おすそわけ 名刺"
version = "1.0.0"
id = "artifacts/meishi"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/meishi/" ]
localPort = 25834

[services.development]
run = "pnpm --filter @workspace/meishi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meishi", "run", "build" ]
publicDir = "artifacts/meishi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25834"
BASE_PATH = "/meishi/"

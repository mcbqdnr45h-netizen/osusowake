app = "osusowake-api"
primary_region = "sin"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  # 定期出品（毎日自動公開）の利用可否。
  #   "all" = 全「承認済み」店に開放（本番運用）。
  #   または店舗IDのカンマ区切り（例 "135,200"）でパイロット/キルスイッチに切替可能。
  RECURRING_PILOT_STORE_IDS = "all"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # 本番(Web+API)配信のためコールドスタートを避ける。常時1台起動。
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
